<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="crackGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
  </defs>
  <!-- Coin body -->
  <circle cx="32" cy="32" r="28" fill="url(#coinGrad)" opacity="0.9"/>
  <!-- Inner ring -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
  <!-- Dollar/Yuan symbol -->
  <text x="32" y="38" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="rgba(255,255,255,0.9)" text-anchor="middle">¥</text>
  <!-- Crack lines -->
  <path d="M20 12 L28 24 L24 28 L32 38 L28 42 L34 54" fill="none" stroke="url(#crackGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M36 18 L38 26 L42 28" fill="none" stroke="url(#crackGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Shatter fragments -->
  <polygon points="18,10 22,14 17,15" fill="#a855f7" opacity="0.6"/>
  <polygon points="44,14 48,18 45,20" fill="#6366f1" opacity="0.5"/>
  <polygon points="26,52 30,56 24,56" fill="#a855f7" opacity="0.5"/>
</svg>
