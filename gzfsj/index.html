    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif; background:#0c0c14; color:#e8e8e8; min-height:100vh; overflow-x:hidden; }
        .bg-aurora { position:fixed; top:0;left:0;right:0;bottom:0; z-index:0; pointer-events:none; overflow:hidden; }
        .bg-aurora .orb { position:absolute; border-radius:50%; filter:blur(80px); animation:drift 12s ease-in-out infinite; }
        .bg-aurora .orb1 { width:350px;height:350px; background:rgba(99,102,241,0.12); top:-80px;left:-80px; }
        .bg-aurora .orb2 { width:300px;height:300px; background:rgba(168,85,247,0.08); top:40%;right:-100px; animation-delay:-4s;animation-duration:15s; }
        .bg-aurora .orb3 { width:250px;height:250px; background:rgba(59,130,246,0.08); bottom:-50px;left:30%; animation-delay:-7s;animation-duration:18s; }
        @keyframes drift { 0%,100%{transform:translate(0,0) scale(1)} 25%{transform:translate(20px,-20px) scale(1.05)} 50%{transform:translate(-10px,15px) scale(0.95)} 75%{transform:translate(15px,10px) scale(1.02)} }
        .container { position:relative; z-index:1; max-width:420px; margin:0 auto; padding:36px 20px 30px; min-height:100vh; display:flex; flex-direction:column; }

        /* Header */
        .header { text-align:center; margin-bottom:32px; }
        .header .logo { width:52px;height:52px; margin:0 auto 12px; background:linear-gradient(135deg,#6366f1,#a855f7,#3b82f6); border-radius:15px; display:flex;align-items:center;justify-content:center; font-size:24px; box-shadow:0 8px 24px rgba(99,102,241,0.25); }
        .header h1 { font-size:24px; font-weight:800; color:#f0f0f0; margin-bottom:5px; letter-spacing:1px; }
        .header p { font-size:13px; color:rgba(255,255,255,0.4); letter-spacing:0.5px; }

        /* Input Section */
        .input-section { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06); border-radius:20px; padding:24px 20px; margin-bottom:16px; backdrop-filter:blur(10px); }
        .input-group { margin-bottom:20px; }
        .input-group:last-child { margin-bottom:0; }
        .input-label { display:flex; align-items:center; flex-wrap:wrap; font-size:13px; color:rgba(255,255,255,0.5); margin-bottom:10px; font-weight:500; gap:6px; }
        .private-tag { display:inline-flex; align-items:center; background:rgba(99,102,241,0.1); border:1px solid rgba(99,102,241,0.2); border-radius:6px; padding:2px 8px; font-size:10px; color:#a5b4fc; }
        .input-wrapper { display:flex; align-items:center; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:0 16px; transition:all 0.3s; }
        .input-wrapper:focus-within { border-color:rgba(99,102,241,0.4); box-shadow:0 0 0 3px rgba(99,102,241,0.08); }
        .input-wrapper .prefix { font-size:18px; color:#a5b4fc; font-weight:600; margin-right:6px; }
        .input-wrapper input { flex:1; background:none; border:none; outline:none; color:#fff; font-size:22px; font-weight:600; padding:14px 0; width:100%; }
        .input-wrapper input::placeholder { color:rgba(255,255,255,0.2); font-weight:400; font-size:18px; }
        .input-wrapper .suffix { font-size:13px; color:rgba(255,255,255,0.3); margin-left:8px; }

        /* Rhythm selector */
        .rhythm-options { display:flex; gap:8px; margin-top:10px; }
        .rhythm-btn { flex:1; padding:10px 6px; border-radius:10px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03); color:rgba(255,255,255,0.5); font-size:12px; text-align:center; cursor:pointer; transition:all 0.2s; line-height:1.3; }
        .rhythm-btn.active { border-color:rgba(99,102,241,0.4); background:rgba(99,102,241,0.1); color:#a5b4fc; }
        .rhythm-btn .rhythm-title { font-weight:600; display:block; margin-bottom:2px; }
        .rhythm-btn .rhythm-desc { font-size:10px; opacity:0.6; }

        /* Quick buttons */
        .quick-amounts { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
        .quick-btn { background:rgba(99,102,241,0.06); border:1px solid rgba(99,102,241,0.15); border-radius:20px; padding:6px 14px; font-size:12px; color:#a5b4fc; cursor:pointer; transition:all 0.2s; white-space:nowrap; }

        /* Calculate button */
        .calc-btn { width:100%; padding:16px; border:none; border-radius:14px; background:linear-gradient(135deg,#6366f1,#8b5cf6); color:#fff; font-size:16px; font-weight:600; cursor:pointer; transition:all 0.3s; margin-top:8px; position:relative; overflow:hidden; letter-spacing:0.5px; }
        .calc-btn::after { content:''; position:absolute; top:0;left:-100%;width:100%;height:100%; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent); animation:shimmer 3s infinite; }
        @keyframes shimmer { 0%{left:-100%} 100%{left:100%} }
        .calc-btn:active { transform:translateY(0); }

        /* Result */
        .result-section { display:none; animation:fadeInUp 0.6s cubic-bezier(0.16,1,0.3,1); }
        @keyframes fadeInUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }

        /* === SHARE CARD — minimal, one focus point === */
        .result-card { background:linear-gradient(165deg,#141428 0%,#0c0c1a 50%,#0f1023 100%); border:1px solid rgba(99,102,241,0.12); border-radius:24px; padding:30px 22px 24px; margin-bottom:16px; position:relative; overflow:hidden; }
        .result-card::before { content:''; position:absolute; top:-60px;right:-60px; width:200px;height:200px; background:radial-gradient(circle,rgba(99,102,241,0.12) 0%,transparent 70%); border-radius:50%; }
        .result-card::after { content:''; position:absolute; bottom:-40px;left:-40px; width:160px;height:160px; background:radial-gradient(circle,rgba(168,85,247,0.08) 0%,transparent 70%); border-radius:50%; }

        .card-inner { position:relative; z-index:1; }
        .card-header { text-align:center; margin-bottom:8px; }
        .card-badge { display:inline-flex; align-items:center; gap:6px; background:linear-gradient(135deg,rgba(99,102,241,0.15),rgba(168,85,247,0.1)); border:1px solid rgba(99,102,241,0.2); border-radius:20px; padding:6px 14px; font-size:11px; color:#c4b5fd; margin-bottom:10px; letter-spacing:0.5px; }
        .card-badge::before { content:'✦'; font-size:10px; }
        .result-amount-label { font-size:12px; color:rgba(255,255,255,0.3); margin-bottom:2px; }
        .result-amount { font-size:20px; font-weight:700; color:rgba(255,255,255,0.18); letter-spacing:6px; }

        /* Big score — the ONE focus */
        .card-score { text-align:center; margin:18px 0 8px; }
        .card-score-number { display:flex; align-items:baseline; justify-content:center; gap:2px; }
        .card-score-value { font-size:72px; font-weight:900; background:linear-gradient(135deg,#a5b4fc,#c084fc,#f0abfc); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; line-height:1; }
        .card-score-max { font-size:20px; color:rgba(255,255,255,0.18); font-weight:400; }
        .card-bar { margin:8px 0; height:6px; background:rgba(255,255,255,0.05); border-radius:3px; overflow:hidden; }
        .card-bar-fill { height:100%; border-radius:3px; background:linear-gradient(90deg,#6366f1,#a855f7,#ec4899); transition:width 1s cubic-bezier(0.16,1,0.3,1); width:0%; }

        /* Level + Percentile */
        .card-meta { text-align:center; margin:10px 0 14px; }
        .pain-level-badge { display:inline-flex; align-items:center; gap:4px; padding:5px 14px; border-radius:12px; font-size:13px; font-weight:600; }
        .level-zen { background:rgba(34,197,94,0.1); color:#4ade80; border:1px solid rgba(34,197,94,0.2); }
        .level-mild { background:rgba(59,130,246,0.1); color:#60a5fa; border:1px solid rgba(59,130,246,0.2); }
        .level-ouch { background:rgba(251,191,36,0.1); color:#fbbf24; border:1px solid rgba(251,191,36,0.2); }
        .level-pain { background:rgba(249,115,22,0.1); color:#fb923c; border:1px solid rgba(249,115,22,0.2); }
        .level-burn { background:rgba(239,68,68,0.1); color:#f87171; border:1px solid rgba(239,68,68,0.2); }
        .percentile { margin-top:8px; font-size:12px; color:rgba(255,255,255,0.4); letter-spacing:0.3px; }
        .percentile strong { color:#c4b5fd; font-weight:700; }

        /* The ONE comment */
        .card-comment { text-align:center; padding:14px 8px; margin:6px 0 12px; font-size:15px; color:rgba(255,255,255,0.88); line-height:1.7; font-weight:500; }

        /* Budget alert in card */
        .budget-alert { display:inline-flex; align-items:center; gap:4px; padding:7px 14px; border-radius:10px; font-size:11px; font-weight:500; }
        .budget-alert.over { background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.2); color:#f87171; }
        .budget-alert.near { background:rgba(251,191,36,0.08); border:1px solid rgba(251,191,36,0.2); color:#fbbf24; }
        .budget-line { text-align:center; margin-bottom:10px; }

        /* Card footer */
        .card-footer { display:flex; align-items:center; justify-content:center; padding-top:14px; border-top:1px solid rgba(255,255,255,0.04); gap:8px; }
        .card-footer-logo { width:20px;height:20px; background:linear-gradient(135deg,#6366f1,#a855f7); border-radius:5px; display:flex;align-items:center;justify-content:center; font-size:10px; }
        .card-footer-text { font-size:11px; color:rgba(255,255,255,0.25); letter-spacing:0.5px; }

        /* === DETAIL SECTION — outside card, not in screenshot === */
        .detail-section { margin-bottom:16px; }
        .detail-block { background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.05); border-radius:16px; padding:16px; margin-bottom:10px; }
        .detail-title { font-size:12px; color:rgba(255,255,255,0.35); margin-bottom:12px; letter-spacing:0.5px; }
        .pain-item { display:flex; align-items:center; padding:9px 10px; margin-bottom:5px; background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.04); border-radius:10px; animation:itemSlide 0.5s cubic-bezier(0.16,1,0.3,1) forwards; opacity:0; }
        @keyframes itemSlide { from{opacity:0;transform:translateX(-15px)} to{opacity:1;transform:translateX(0)} }
        .pain-icon { font-size:16px; margin-right:8px; width:28px;height:28px; display:flex;align-items:center;justify-content:center; background:rgba(99,102,241,0.08); border-radius:7px; flex-shrink:0; }
        .pain-text { flex:1; font-size:12px; color:rgba(255,255,255,0.5); }
        .pain-value { font-size:17px; font-weight:700; color:#e0e7ff; margin-left:6px; }
        .pain-unit { font-size:10px; color:rgba(255,255,255,0.3); margin-left:2px; }

        .also-buy-items { display:flex; flex-direction:column; gap:6px; }
        .also-buy-item { display:flex; align-items:center; font-size:12px; color:rgba(255,255,255,0.55); }
        .also-buy-item .abi-icon { margin-right:8px; font-size:14px; }
        .also-buy-item .abi-num { color:#c4b5fd; font-weight:600; margin:0 3px; }

        /* Monthly projection (cold start) */
        .month-proj { padding:12px 14px; background:rgba(168,85,247,0.05); border:1px solid rgba(168,85,247,0.1); border-radius:12px; text-align:center; font-size:12px; color:rgba(255,255,255,0.5); line-height:1.6; }
        .month-proj strong { color:#c4b5fd; }

        /* Actions */
        .action-btns { display:flex; gap:10px; margin-bottom:12px; }
        .action-btn { flex:1; padding:14px; border-radius:14px; font-size:14px; font-weight:500; cursor:pointer; transition:all 0.2s; text-align:center; border:none; }
        .action-btn.primary { background:linear-gradient(135deg,#6366f1,#8b5cf6); color:#fff; box-shadow:0 4px 15px rgba(99,102,241,0.2); }
        .action-btn.secondary { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); color:rgba(255,255,255,0.6); }
        .action-btn:active { transform:scale(0.97); }

        .privacy-note { display:flex; align-items:center; justify-content:center; gap:6px; padding:10px; margin-bottom:12px; background:rgba(34,197,94,0.04); border:1px solid rgba(34,197,94,0.1); border-radius:10px; }
        .privacy-note span { font-size:11px; color:rgba(34,197,94,0.7); }

        /* Stats Banner */
        .stats-banner { background:rgba(99,102,241,0.04); border:1px solid rgba(99,102,241,0.1); border-radius:16px; padding:16px 18px; margin-bottom:16px; display:none; }
        .stats-banner.show { display:block; animation:fadeInUp 0.4s ease; }
        .stats-title { font-size:12px; color:rgba(255,255,255,0.35); margin-bottom:12px; display:flex; align-items:center; gap:6px; }
        .stats-title::before { content:'📊'; font-size:13px; }
        .stats-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
        .stat-item { text-align:center; padding:8px 4px; background:rgba(255,255,255,0.02); border-radius:10px; }
        .stat-num { font-size:20px; font-weight:700; color:#a5b4fc; line-height:1.2; }
        .stat-label { font-size:10px; color:rgba(255,255,255,0.3); margin-top:2px; }
        .stats-highlight { margin-top:10px; padding:8px 12px; background:rgba(168,85,247,0.06); border:1px solid rgba(168,85,247,0.1); border-radius:10px; font-size:12px; color:rgba(255,255,255,0.5); text-align:center; line-height:1.5; }
        .stats-highlight strong { color:#c4b5fd; font-weight:600; }

        .disclaimer { text-align:center; font-size:11px; color:rgba(255,255,255,0.2); margin-top:auto; padding-top:16px; line-height:1.6; }
        .toast { position:fixed; top:50%;left:50%; transform:translate(-50%,-50%) scale(0.8); background:rgba(20,20,40,0.95); border:1px solid rgba(99,102,241,0.2); color:#fff; padding:16px 28px; border-radius:14px; font-size:14px; opacity:0; transition:all 0.3s; z-index:999; pointer-events:none; backdrop-filter:blur(10px); }
        .toast.show { opacity:1; transform:translate(-50%,-50%) scale(1); }

        @media (max-width:380px) {
            .container { padding:28px 16px 20px; }
            .result-card { padding:24px 16px 20px; }
            .card-score-value { font-size:58px; }
        }
    </style>
</head>
<body>
    <div class="bg-aurora"><div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div></div>
    <div class="container">
        <!-- INPUT PAGE -->
        <div id="inputPage">
            <div class="header">
                <div class="logo">💸</div>
                <h1>工资粉碎机</h1>
                <p>每一块钱，都是你的命</p>
            </div>
            <div class="stats-banner" id="statsBanner">
                <div class="stats-title">你的粉碎档案</div>
                <div class="stats-grid">
                    <div class="stat-item"><div class="stat-num" id="statCount">0</div><div class="stat-label">累计粉碎</div></div>
                    <div class="stat-item"><div class="stat-num" id="statHours">0</div><div class="stat-label">累计加班(h)</div></div>
                    <div class="stat-item"><div class="stat-num" id="statAvgScore">0</div><div class="stat-label">平均心碎</div></div>
                </div>
                <div class="stats-highlight" id="statsHighlight"></div>
            </div>
            <div class="input-section">
                <div class="input-group">
                    <label class="input-label">你的月薪（税后）<span class="private-tag">🔒 不会显示</span></label>
                    <div class="input-wrapper">
                        <span class="prefix">¥</span>
                        <input type="number" id="salaryInput" placeholder="8000" inputmode="numeric">
                        <span class="suffix">/ 月</span>
                    </div>
                </div>
                <div class="input-group">
                    <label class="input-label">你的工作节奏</label>
                    <div class="rhythm-options">
                        <div class="rhythm-btn active" data-rhythm="normal" onclick="setRhythm(this)"><span class="rhythm-title">朝九晚六</span><span class="rhythm-desc">双休 · 22天</span></div>
                        <div class="rhythm-btn" data-rhythm="bigsmall" onclick="setRhythm(this)"><span class="rhythm-title">大小周</span><span class="rhythm-desc">26天 · 9h</span></div>
                        <div class="rhythm-btn" data-rhythm="996" onclick="setRhythm(this)"><span class="rhythm-title">996</span><span class="rhythm-desc">26天 · 12h</span></div>
                    </div>
                </div>
                <div class="input-group">
                    <label class="input-label">这笔消费多少钱</label>
                    <div class="input-wrapper">
                        <span class="prefix">¥</span>
                        <input type="number" id="spendInput" placeholder="38" inputmode="numeric">
                    </div>
                    <div class="quick-amounts">
                        <span class="quick-btn" data-amount="15">早餐 ¥15</span>
                        <span class="quick-btn" data-amount="38">咖啡 ¥38</span>
                        <span class="quick-btn" data-amount="88">外卖 ¥88</span>
                        <span class="quick-btn" data-amount="299">购物 ¥299</span>
                        <span class="quick-btn" data-amount="999">数码 ¥999</span>
                        <span class="quick-btn" data-amount="4999">大件 ¥4999</span>
                    </div>
                </div>
            </div>
            <button class="calc-btn" onclick="calculate()">看看工资碎了多少</button>
            <div class="privacy-note"><span>🔒 所有计算在本地完成，不收集不上传任何数据</span></div>
        </div>

        <!-- RESULT PAGE -->
        <div id="resultPage" class="result-section">
            <!-- === SHARE CARD: only this div gets screenshotted === -->
            <div class="result-card" id="resultCard">
                <div class="card-inner">
                    <div class="card-header">
                        <div class="card-badge">工资粉碎报告</div>
                        <div class="result-amount-label">一笔不愿透露的消费</div>
                        <div class="result-amount">¥ · · ·</div>
                    </div>
                    <div class="card-score">
                        <div class="card-score-number">
                            <span class="card-score-value" id="painScore">0</span>
                            <span class="card-score-max">/100</span>
                        </div>
                        <div class="card-bar"><div class="card-bar-fill" id="painBar"></div></div>
                    </div>
                    <div class="card-meta">
                        <div id="painLevelBadge"></div>
                        <div class="percentile" id="percentileText"></div>
                    </div>
                    <div class="card-comment" id="painComment"></div>
                    <div class="budget-line" id="budgetWarning" style="display:none;"></div>
                    <div class="card-footer">
                        <div class="card-footer-logo">💸</div>
                        <span class="card-footer-text">工资粉碎机 · 花钱一时爽 加班火葬场</span>
                    </div>
                </div>
            </div>
            <!-- === END SHARE CARD === -->

            <!-- Detail breakdown — NOT in screenshot -->
            <div class="detail-section">
                <div class="detail-block">
                    <div class="detail-title">⏰ 这笔钱等于你...</div>
                    <div id="painItems"></div>
                </div>
                <div class="detail-block" id="alsoBuy" style="display:none;">
                    <div class="detail-title">💡 这笔钱还能用来</div>
                    <div class="also-buy-items" id="alsoBuyItems"></div>
                </div>
                <div class="detail-block" id="monthProj" style="display:none;">
                    <div class="month-proj" id="monthProjText"></div>
                </div>
            </div>

            <div class="action-btns">
                <button class="action-btn secondary" onclick="reset()">再碎一笔</button>
                <button class="action-btn primary" onclick="saveCard()">保存分享卡片</button>
            </div>
            <div class="privacy-note"><span>🔒 分享卡片不包含你的收入和消费金额，放心分享</span></div>
        </div>
        <div class="disclaimer">本工具仅供娱乐参考 · 不收集任何个人信息 · 不构成财务建议</div>

    const RECENT_KEY  = 'ps_recent_comments';

    /* === Storage helpers === */
    function getHistory() { try { return JSON.parse(localStorage.getItem(HISTORY_KEY)||'[]'); } catch { return []; } }
    function saveHistoryEntry(entry) {
        const h = getHistory(); h.push(entry);
        if (h.length > 200) h.splice(0, h.length - 200);
        localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
    }
    function getRecentComments() { try { return JSON.parse(localStorage.getItem(RECENT_KEY)||'{}'); } catch { return {}; } }
    function saveRecentComment(level, comment) {
        const rc = getRecentComments();
        if (!rc[level]) rc[level] = [];
        rc[level].push(comment);
        if (rc[level].length > 6) rc[level].shift();
        localStorage.setItem(RECENT_KEY, JSON.stringify(rc));
    }
    function pickFresh(arr, level) {
        const recent = (getRecentComments()[level] || []);
        const fresh = arr.filter(c => !recent.includes(c));
        const pool = fresh.length > 0 ? fresh : arr;
        const chosen = pool[Math.floor(Math.random() * pool.length)];
        saveRecentComment(level, chosen);
        return chosen;
    }
    function getMonthSpend() {
        const h = getHistory();
        const ms = new Date(new Date().getFullYear(), new Date().getMonth(), 1).getTime();
        return h.filter(e => (e.ts||0) >= ms).reduce((s,e) => s + (e.spend||0), 0);
    }

    /* === Percentile generator (based on pain score curve) === */
    function getPercentile(ps) {
        // Maps pain score to a "you beat X% of workers" number
        // Low pain = low percentile (most people don't hurt), high pain = high percentile
        if (ps <= 10) return Math.round(15 + Math.random()*10);
        if (ps <= 25) return Math.round(30 + Math.random()*12);
        if (ps <= 40) return Math.round(48 + Math.random()*10);
        if (ps <= 55) return Math.round(62 + Math.random()*8);
        if (ps <= 70) return Math.round(74 + Math.random()*8);
        if (ps <= 85) return Math.round(85 + Math.random()*7);
        return Math.round(93 + Math.random()*5);
    }

        document.getElementById('statHours').textContent = totalH.toFixed(1);
        document.getElementById('statAvgScore').textContent = avgS;
        const worst = h.reduce((a,b) => (b.painScore||0) > (a.painScore||0) ? b : a, h[0]);

        const wc = h.filter(e => (e.ts||0) > weekAgo).length;
        const hl = document.getElementById('statsHighlight');

    }

    const levels = {

    function getLevel(s) { if(s<=20) return 'zen'; if(s<=40) return 'mild'; if(s<=60) return 'ouch'; if(s<=80) return 'pain'; return 'burn'; }

    /* === Also-buy === */
    function getAlsoBuy(spend) {
        const pool = [
            {icon:'🍜',text:'碗兰州拉面',price:18},{icon:'☕',text:'杯便利店咖啡',price:12},
            {icon:'🚇',text:'次地铁通勤',price:5},{icon:'🧋',text:'杯奶茶',price:15},
            {icon:'🍱',text:'份外卖',price:30},{icon:'🎬',text:'张电影票',price:45},
            {icon:'📱',text:'个月视频会员',price:25},{icon:'💇',text:'次理发',price:40},
            {icon:'🧺',text:'次洗衣店',price:20},{icon:'🚕',text:'公里打车',price:3},
            {icon:'📚',text:'本平装书',price:35},{icon:'🏋️',text:'天健身日卡',price:50},
        ];
        const shuffled = pool.sort(()=>Math.random()-0.5);
        const r = [];
        for (const it of shuffled) { if(r.length>=3)break; const c=Math.floor(spend/it.price); if(c>=1&&c<=999) r.push({...it,count:c}); }
        return r;
    }

    /* ==================== MAIN CALCULATE ==================== */
    function calculate() {
        const salary = parseFloat(document.getElementById('salaryInput').value);
        const spend  = parseFloat(document.getElementById('spendInput').value);
        if (!salary || salary<=0) { showToast('请输入月薪'); return; }
        if (!spend  || spend<=0)  { showToast('请输入消费金额'); return; }
        localStorage.setItem('ps_salary', salary);

        const r = rhythmConfig[currentRhythm];
        const totalMin = r.days * r.hours * 60;
        const minRate  = salary / totalMin;
        const costMin  = spend / minRate;

        const overtimeH = (costMin/60).toFixed(1);
        const meetings  = (costMin/45).toFixed(1);
        const reports   = (costMin/120).toFixed(1);
        const commutes  = (costMin/50).toFixed(1);
        const emails    = Math.round(costMin/4);

        // === Pain score with cumulative awareness ===
        const ratio = spend / salary;
        const monthBefore = getMonthSpend();
        const monthAfter  = monthBefore + spend;
        const monthRatio  = monthAfter / salary;

        let ps;
        if (ratio<=0.005) ps = Math.round(ratio/0.005*15);
        else if (ratio<=0.02)  ps = 15+Math.round((ratio-0.005)/0.015*25);
        else if (ratio<=0.05)  ps = 40+Math.round((ratio-0.02)/0.03*20);
        else if (ratio<=0.15)  ps = 60+Math.round((ratio-0.05)/0.10*20);
        else if (ratio<=0.5)   ps = 80+Math.round((ratio-0.15)/0.35*15);
        else ps = Math.min(99, 95+Math.round((ratio-0.5)*8));

        if (monthRatio >= 1.0) ps = Math.max(ps, 85+Math.min(14, Math.round((monthRatio-1)*20)));
        else if (monthRatio >= 0.8) ps = Math.max(ps, ps + Math.round((monthRatio-0.8)*100));
        ps = Math.max(1, Math.min(99, ps));

        const lv = getLevel(ps);
        const li = levels[lv];
        const pct = getPercentile(ps);

        // Choose comment
        let chosenComment;
        if (monthRatio >= 1.0) chosenComment = pickFresh(overspendComments, 'overspend');
        else if (monthRatio >= 0.8 && Math.random()<0.5) chosenComment = pickFresh(nearLimitComments, 'nearlimit');
        else chosenComment = pickFresh(comments[lv], lv);

        // === Render CARD (minimal) ===
        document.getElementById('painScore').textContent = ps;
        document.getElementById('painBar').style.width = '0%';
        document.getElementById('painLevelBadge').innerHTML = `<span class="pain-level-badge ${li.cls}">${li.icon} ${li.label}</span>`;
        document.getElementById('percentileText').innerHTML = `你的心碎程度超越了 <strong>${pct}%</strong> 的打工人`;
        document.getElementById('painComment').textContent = chosenComment;

        // Budget warning in card
        const bw = document.getElementById('budgetWarning');
        if (monthRatio >= 1.0) {
            bw.innerHTML = `<span class="budget-alert over">⚠️ 本月累计消费已超出月薪 ${Math.round((monthRatio-1)*100)}%</span>`;
            bw.style.display = 'block';
        } else if (monthRatio >= 0.8) {
            bw.innerHTML = `<span class="budget-alert near">📊 本月已花掉月薪的 ${Math.round(monthRatio*100)}%</span>`;
            bw.style.display = 'block';
        } else { bw.style.display = 'none'; }

        // === Render DETAIL (outside card) ===
        const allItems = [
            {icon:'⏰',text:'需要加班',value:overtimeH,unit:'小时'},
            {icon:'🗣',text:'等于开',value:meetings,unit:'次无效会议'},
            {icon:'📝',text:'等于写',value:reports,unit:'份周报'},
            {icon:'🚇',text:'够你通勤',value:commutes,unit:'趟'},
            {icon:'📧',text:'相当于回',value:emails,unit:'封邮件'},
            {icon:'😤',text:'约等于忍老板',value:(costMin/30).toFixed(1),unit:'次'},
            {icon:'🪑',text:'等于久坐',value:(costMin/60).toFixed(1),unit:'小时不起身'},
        ];
        const rest = allItems.slice(1).sort(()=>Math.random()-0.5).slice(0,3);
        const items = [allItems[0], ...rest];
        let html = '';
        items.forEach((it,i) => {
            html += `<div class="pain-item" style="animation-delay:${0.1+i*0.08}s"><span class="pain-icon">${it.icon}</span><span class="pain-text">${it.text}</span><span class="pain-value">${it.value}</span><span class="pain-unit">${it.unit}</span></div>`;
        });
        document.getElementById('painItems').innerHTML = html;

        const ab = getAlsoBuy(spend);
        let abH = '';
        ab.forEach(a => { abH += `<div class="also-buy-item"><span class="abi-icon">${a.icon}</span>买<span class="abi-num">${a.count}</span>${a.text}</div>`; });
        document.getElementById('alsoBuyItems').innerHTML = abH;
        document.getElementById('alsoBuy').style.display = ab.length > 0 ? 'block' : 'none';

        // === Monthly projection (cold start fix) ===
        const proj = document.getElementById('monthProj');
        const projText = document.getElementById('monthProjText');
        const now = new Date();
        const daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
        const daysPassed = now.getDate();
        const daysLeft = daysInMonth - daysPassed;

        if (monthAfter > 0) {
            const actualPct = Math.round((monthAfter / salary) * 100);
            // Only show projection if enough days have passed (>=3) to be meaningful
            if (daysPassed >= 3) {
                const dailyAvg = monthAfter / daysPassed;
                const projectedTotal = dailyAvg * daysInMonth;
                const projRatio = Math.min(Math.round((projectedTotal / salary) * 100), 999);
                if (projRatio >= 100) {
                    projText.innerHTML = `按目前花法，本月预计花掉月薪的 <strong>${projRatio}%</strong>（超支 <strong>${projRatio-100}%</strong>）· 距月底还有 <strong>${daysLeft}</strong> 天`;
                } else if (projRatio >= 70) {
                    projText.innerHTML = `按目前花法，本月预计花掉月薪的 <strong>${projRatio}%</strong> · 距月底还有 <strong>${daysLeft}</strong> 天`;
                } else {
                    projText.innerHTML = `本月已消费月薪的 <strong>${actualPct}%</strong> · 距月底还有 <strong>${daysLeft}</strong> 天`;
                }
            } else {
                // Early in the month — just show actual spend ratio
                if (actualPct >= 80) {
                    projText.innerHTML = `才${daysPassed}号，你已经花掉了月薪的 <strong>${actualPct}%</strong>  · 距月底还有 <strong>${daysLeft}</strong> 天`;
                } else {
                    projText.innerHTML = `本月已消费月薪的 <strong>${actualPct}%</strong> · 距月底还有 <strong>${daysLeft}</strong> 天`;
                }
            }
            proj.style.display = 'block';
        } else { proj.style.display = 'none'; }

        // Save
        saveHistoryEntry({ ts:Date.now(), spend, painScore:ps, level:lv, overtimeH:parseFloat(overtimeH), rhythm:currentRhythm });

        // Switch page
        document.getElementById('inputPage').style.display = 'none';
        document.getElementById('resultPage').style.display = 'block';
        window.scrollTo({top:0,behavior:'smooth'});
        setTimeout(() => { document.getElementById('painBar').style.width = ps+'%'; }, 100);
    }

    function reset() {
        document.getElementById('inputPage').style.display = 'block';
        document.getElementById('resultPage').style.display = 'none';
        document.getElementById('spendInput').value = '';
        document.getElementById('painBar').style.width = '0%';
        window.scrollTo({top:0,behavior:'smooth'});
        renderStats();
    }

    function saveCard() {
        const card = document.getElementById('resultCard');
        showToast('正在生成卡片...');
        html2canvas(card, { backgroundColor:'#0c0c14', scale:2, useCORS:true, logging:false }).then(canvas => {
            const link = document.createElement('a');
            link.download = '工资粉碎报告.png';
            link.href = canvas.toDataURL('image/png');
            if (navigator.share && navigator.canShare) {
                canvas.toBlob(blob => {
                    const file = new File([blob],'工资粉碎报告.png',{type:'image/png'});
                    if (navigator.canShare({files:[file]})) {
                        navigator.share({files:[file],title:'工资粉碎机',text:'花钱一时爽，加班火葬场...'}).catch(()=>{link.click();showToast('卡片已保存');});
                    } else { link.click(); showToast('卡片已保存'); }
                });
            } else { link.click(); showToast('卡片已保存，长按可分享'); }
        }).catch(()=>{ showToast('请直接截图保存'); });
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.classList.add('show');
        setTimeout(()=>t.classList.remove('show'), 2000);
    }
    </script>
